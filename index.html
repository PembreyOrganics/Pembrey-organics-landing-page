<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Pembrey Organics</title>

  <meta
    name="description"
    content="Organic and biodynamic food and drink, delivered to your door."
  >

  <link
    rel="icon"
    href="https://pembrey-organics.light-maple-4207.chatgpt.site/pembrey-beet-favicon.png"
  >

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:wght@400;500&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --green: #123b2a;
      --dark-green: #0b2d20;
      --cream: #f3f0e7;
      --paper: #fcfaf5;
      --text: #152019;
      --orange: #b96747;
      --line: #d7d0c2;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--cream);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }

    a {
      color: inherit;
    }

    h1,
    h2,
    h3 {
      font-family: Newsreader, Georgia, serif;
      font-weight: 400;
    }

    .coming-soon {
      min-height: 76px;
      padding: 14px 24px;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      background: var(--dark-green);
    }

    .coming-soon::before {
      width: min(70vw, 620px);
      height: 110px;
      position: absolute;
      border-radius: 50%;
      background:
        radial-gradient(
          ellipse,
          rgba(224, 145, 79, 0.25),
          transparent 70%
        );
      content: "";
      animation: glow 3s ease-in-out infinite;
    }

    .coming-soon p {
      position: relative;
      z-index: 1;
      margin: 0;
      color: #f5d6a5;
      font-family: Newsreader, Georgia, serif;
      font-size: clamp(28px, 3.2vw, 42px);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-shadow:
        0 0 9px rgba(255, 205, 139, 0.9),
        0 0 24px rgba(224, 130, 70, 0.72),
        0 0 46px rgba(224, 130, 70, 0.42);
    }

    @keyframes glow {
      0%,
      100% {
        opacity: 0.7;
        transform: scale(0.94);
      }

      50% {
        opacity: 1;
        transform: scale(1.06);
      }
    }

    header {
      height: 126px;
      padding: 0 clamp(24px, 4vw, 64px);
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .logo {
      width: 182px;
      height: 120px;
      display: block;
    }

    .logo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    .hero {
      min-height: 720px;
      display: grid;
      grid-template-columns: minmax(440px, 48%) 1fr;
    }

    .hero-copy {
      padding: clamp(72px, 8vw, 128px) clamp(34px, 6vw, 96px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero h1 {
      max-width: 690px;
      margin: 0;
      color: var(--dark-green);
      font-size: clamp(58px, 6.5vw, 104px);
      letter-spacing: -0.055em;
      line-height: 0.94;
    }

    .hero-button {
      min-width: 210px;
      margin-top: 46px;
      padding: 16px 20px;
      display: inline-flex;
      justify-content: space-between;
      gap: 24px;
      border: 1px solid var(--dark-green);
      background: var(--dark-green);
      color: var(--paper);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .hero-image {
      min-height: 720px;
      position: relative;
      overflow: hidden;
      border-top-left-radius: 48% 38%;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      display: block;
      object-fit: cover;
    }

    .how-it-works {
      padding: clamp(96px, 11vw, 160px)
        clamp(24px, 7vw, 110px);
    }

    .how-it-works > h2 {
      margin: 0 0 clamp(42px, 6vw, 78px);
      color: var(--dark-green);
      font-size: clamp(52px, 5.4vw, 82px);
      letter-spacing: -0.05em;
      line-height: 0.97;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(26px, 4vw, 64px);
    }

    .steps article {
      padding-top: 22px;
      border-top: 1px solid var(--green);
    }

    .steps h3 {
      min-height: 2.2em;
      margin: 0 0 18px;
      color: var(--dark-green);
      font-size: clamp(30px, 3vw, 46px);
      letter-spacing: -0.035em;
      line-height: 1.05;
    }

    .steps p {
      max-width: 370px;
      margin: 0;
      color: #566057;
      font-size: 18px;
      line-height: 1.6;
    }

    .benefits-section {
      padding: clamp(76px, 8vw, 122px)
        clamp(24px, 6vw, 96px);
      background: var(--paper);
    }

    .benefits {
      max-width: 1180px;
      margin: 0 auto;
      padding: clamp(42px, 6vw, 76px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(34px, 5vw, 72px);
      background: var(--dark-green);
      color: var(--paper);
    }

    .benefits article {
      padding-top: 26px;
      border-top: 1px solid #789080;
    }

    .benefits h2 {
      margin: 0;
      font-size: clamp(38px, 4vw, 62px);
      letter-spacing: -0.05em;
      line-height: 0.97;
    }

    .benefits p {
      margin: 28px 0 0;
      color: #d7dfd8;
      font-size: 16px;
      line-height: 1.7;
    }

    .signup {
      padding: clamp(90px, 11vw, 160px)
        clamp(24px, 7vw, 110px);
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: clamp(56px, 10vw, 150px);
      background: #e7e4d9;
    }

    .signup h2 {
      margin: 0;
      color: var(--dark-green);
      font-size: clamp(52px, 5.4vw, 82px);
      letter-spacing: -0.05em;
      line-height: 0.97;
    }

    .signup-copy p {
      max-width: 440px;
      margin: 28px 0 0;
      color: #566057;
      font-size: 16px;
      line-height: 1.65;
    }

    .signup-form {
      min-height: 390px;
      padding: 28px 32px;
      border: 1px solid #c7c2b4;
      background: var(--paper);
    }

    .signup-form iframe {
      display: block;
      border: 0;
    }

    .form-link {
      width: max-content;
      margin: 4px auto 0;
      display: block;
      color: var(--dark-green);
      font-size: 12px;
      font-weight: 600;
      text-underline-offset: 5px;
    }

    footer {
      min-height: 150px;
      padding: 32px clamp(24px, 4vw, 64px);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 24px;
      background: #091e16;
      color: #d7dfd8;
      font-size: 12px;
    }

    footer a {
      font-weight: 500;
      text-underline-offset: 5px;
    }

    @media (max-width: 820px) {
      header {
        height: 92px;
        padding: 0 18px;
      }

      .logo {
        width: 122px;
        height: 86px;
      }

      .hero {
        min-height: 0;
        grid-template-columns: 1fr;
      }

      .hero-copy {
        padding: 54px 22px 48px;
      }

      .hero h1 {
        font-size: clamp(48px, 14vw, 62px);
      }

      .hero-button {
        width: 100%;
      }

      .hero-image {
        min-height: 440px;
        border-top-left-radius: 42% 38%;
      }

      .how-it-works {
        padding: 92px 22px;
      }

      .how-it-works > h2,
      .signup h2 {
        font-size: clamp(50px, 14vw, 68px);
      }

      .steps,
      .benefits,
      .signup {
        grid-template-columns: 1fr;
      }

      .steps {
        gap: 46px;
      }

      .steps h3 {
        min-height: 0;
      }

      .benefits-section {
        padding: 90px 22px;
      }

      .benefits {
        padding: 38px 26px;
        gap: 52px;
      }

      .signup {
        padding: 92px 22px;
        gap: 48px;
      }

      .signup-form {
        min-height: 360px;
        padding: 20px 14px;
      }

      footer {
        padding: 52px 22px;
        grid-template-columns: 1fr;
        align-items: start;
      }
    }

    @media (max-width: 720px) {
      .coming-soon {
        min-height: 64px;
      }

      .coming-soon p {
        font-size: 30px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="coming-soon">
      <p>Coming Soon</p>
    </section>

    <header>
      <a class="logo" href="#top" aria-label="Pembrey Organics home">
        <img
          src="https://pembrey-organics.light-maple-4207.chatgpt.site/pembrey-beet-logo.png"
          alt="Pembrey Organics"
        >
      </a>
    </header>

    <section class="hero" id="top">
      <div class="hero-copy">
        <h1>
          Organic and biodynamic food and drink, delivered to your door.
        </h1>

        <a class="hero-button" href="#signup">
          Join the waitlist
          <span>→</span>
        </a>
      </
